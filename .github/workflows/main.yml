name: Build QtScrcpy from AUR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo curl
          pacman -S --noconfirm libxcomposite qt5-wayland scrcpy android-tools \
            qt5-base qt5-declarative qt5-multimedia qt5-x11extras \
            qt5-svg qt5-tools ffmpeg gcc-libs glibc

      - name: Create builder
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build package
        run: |
          su builder -c "git clone https://aur.archlinux.org/qtscrcpy-bin.git /home/builder/qtscrcpy-bin"
          cd /home/builder/qtscrcpy-bin
          sed -i 's/android-sdk-platform-tools/android-tools/g' PKGBUILD
          su builder -c "makepkg -s --noconfirm --skipinteg"

      - name: Checkout repository source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Copy built package to repo root
        run: |
          cp /home/builder/qtscrcpy-bin/*.pkg.tar.zst .

      - name: Commit and push to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pkg.tar.zst
          git commit -m "Add built QtScrcpy package from workflow run #${{ github.run_number }}" || echo "No changes to commit"
          git push
          
