name: Build qt5-styleplugins from AUR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Install deps and build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo curl \
            gtk2 qt5-base

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build qt5-styleplugins from AUR
        run: |
          su builder -c "git clone https://aur.archlinux.org/qt5-styleplugins.git /home/builder/qt5-styleplugins"
          cd /home/builder/qt5-styleplugins
          su builder -c "makepkg -s --noconfirm --skipinteg"

      - name: Checkout repository source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Copy built package to repo root
        run: |
          cp /home/builder/qt5-styleplugins/*.pkg.tar.zst .

      - name: Commit and push to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pkg.tar.zst
          git commit -m "Add built qt5-styleplugins package from workflow run #${{ github.run_number }}" || echo "No changes to commit"
          git push
