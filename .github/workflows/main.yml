name: Build QtScrcpy from AUR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo curl
          pacman -S --noconfirm libxcomposite qt5-wayland scrcpy android-tools \
            qt5-base qt5-declarative qt5-multimedia qt5-x11extras \
            qt5-svg qt5-tools ffmpeg gcc-libs glibc

      - name: Create builder
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build package
        run: |
          su builder -c "git clone https://aur.archlinux.org/qtscrcpy-bin.git /home/builder/qtscrcpy-bin"
          cd /home/builder/qtscrcpy-bin
          sed -i 's/android-sdk-platform-tools/android-tools/g' PKGBUILD
          su builder -c "makepkg -s --noconfirm --skipinteg"

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "QtScrcpy Build ${{ github.run_number }}"
          files: /home/builder/qtscrcpy-bin/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
