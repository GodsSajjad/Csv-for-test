name: Clean Repository (Keep .github only)

on:
  workflow_dispatch:  # Manual trigger

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete all files and folders except .github and .git
        run: |
          # Go to the repository root
          cd $GITHUB_WORKSPACE
          # Remove everything except .github and .git
          find . -mindepth 1 -maxdepth 1 ! -name '.github' ! -name '.git' -exec rm -rf {} +

      - name: Commit and push deletion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean repository: removed all source files except .github" || echo "No changes to commit"
          git push